baseURL = 'https://www.EHBasilii.com/'
theme = 'FixIt'
defaultContentLanguage = 'zh-cn'
title = 'EHBasilii Orchestration'
mainSections = ['posts']

[outputs]
home = ['html', 'rss', 'archives', 'offline', 'link', 'search']
page = ['html', 'markdown']
section = ['html', 'rss']
taxonomy = ['html']
term = ['html', 'rss']

[params.author]
name = "Eleutherus Hēsychius Basiliī"
email = "contact@ehbasilii.com"
link = "https://www.ehbasilii.com/"
avatar = "https://www.ehbasilii.com/images/avatar.jpg"

[params]
enableTranslationMerge = true

[params.footer]
copyright = true
author = true
powered = { enable = true, hugoLogo = true, themeLogo = true }
order = { powered = 0, copyright = 0, statistics = 0, visitor = 0, beian = 0 }

